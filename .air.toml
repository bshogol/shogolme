root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/blog ."
  bin = "./tmp/blog"
  full_bin = "FRONTEND_DIR=./frontend/dist LOG_FORMAT=text ./tmp/blog"
  delay = 1000
  exclude_dir = ["tmp", "frontend", "node_modules", "bin"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go"]
  kill_delay = 500

[log]
  time = false

[misc]
  clean_on_exit = true
